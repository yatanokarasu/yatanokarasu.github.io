<div class="contents-footer">
  {% if paginator.previous_page %}
    {% if paginator.previous_page == 1 %}
      <a href="/" class="button previous fade-transition">Previous</a>
    {% else %}
      <a href="/page{{ paginator.previous_page }}" class="button previous fade-transition">Previous</a>
    {% endif %}
  {% else %}
    <span class="button previous disable">Previous</span>
  {% endif %}
  <span class="pagination">Page {{ paginator.page }} of {{ paginator.total_pages }}</span>
  {% if paginator.next_page %}
    <a href="/page{{ paginator.next_page }}" class="button next fade-transition">Next</a>
  {% else %}
    <span class="button next disable">Next</span>
  {% endif %}
</div>
