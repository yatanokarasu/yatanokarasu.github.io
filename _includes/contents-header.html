<div class="contents-header">
  <div>
    <h1>{{ page.title }}</h1>
    {% if page.layout == 'post' %}
      <h3><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %d, %Y" }}</time></h3>
    {% else %}
      <h3>{{ page.description }}</h3>
    {% endif %}
    {% if page.modified %}
      <p><i class="fa fa-clock-o"></i> modified: {{ page.modified | date: "%B %d, %Y" }}</p>
    {% endif %}
  </div>
</div>
