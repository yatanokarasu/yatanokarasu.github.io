---
layout: default
---

<!-- Post teasers -->
<article>
  <header>
    <h1>{{ page.title }}</h1>
  </header>
  <section class="article-contents">
    {{ page.content }}
  </section>
</article>

<div class="contents-footer">
  {% if page.previous %}
    <a href="{{ page.previous.url }}" class="button previous fade-transition">Previous Post</a>
  {% else %}
    <span class="button previous disable">Previous Post</span>
  {% endif %}
  {% if page.next %}
    <a href="{{ page.next.url }}" class="button next fade-transition">Next Post</a>
  {% else %}
    <span class="button next disable">Next Post</span>
  {% endif %}
</div>
