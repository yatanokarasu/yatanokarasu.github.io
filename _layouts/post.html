---
layout:         default
---

<!-- Post -->
<article class="contents">
  <section class="contents-entry">
    {{ content }}
  </section>
  <footer class="contents-footer">
    <div class="related-tags">
      <h3>Tagged as follows</h3>
      <span class="tags">{% for tag in page.tags %}<a href="{{ site.url }}/tags#{{ tag }}" title="Pages tagged {{ tag }}" class="tag"><span>{{ tag }}</span></a>{% unless forloop.last %}{% endunless %}{% endfor %}</span>
    </div>
    <div class="around-posts">
      <div class="previous-post"></div>
      <div class="next-post"></div>
    </div>
  </footer>
</article>

<!-- Contents footer -->
<div class="contents-footer">
  
</div>
